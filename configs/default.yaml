# E-commerce PDP two-stage recommender — default config
# Scale down for CI smoke tests; scale up for fuller local runs.

paths:
  data_dir: data
  artifacts_dir: artifacts

data:
  n_users: 4000
  n_items: 2500
  n_categories: 12
  n_brands: 80
  seed: 42
  # Temporal holdout fraction (last portion of timeline = test)
  test_fraction: 0.15
  min_events_per_user: 5
  # Implicit engagement weights (funnel)
  weight_impression: 0.001
  weight_click: 0.01
  weight_atc: 0.1
  weight_purchase: 1.0

retrieval:
  embed_dim: 64
  hidden_dim: 128
  id_embed_dim: 32
  batch_size: 512
  epochs: 8
  learning_rate: 0.001
  temperature: 0.07
  hard_negatives: 5
  candidate_k: 100
  # Leave-one-out history length for context tower
  max_history: 20
  device: cpu  # set to cuda when available

faiss:
  index_type: flat  # flat | ivf
  nlist: 64
  nprobe: 8

ranking:
  negatives_per_positive: 15
  max_train_queries: 6000
  max_eval_queries: 800
  learning_rate: 0.05
  num_leaves: 63
  min_data_in_leaf: 20
  feature_fraction: 0.85
  bagging_fraction: 0.8
  bagging_freq: 1
  max_rounds: 300
  early_stopping_rounds: 30
  ndcg_eval_at: [8, 10]
  # Sparse cohort: users with fewer than this many train interactions
  sparse_threshold: 8

serving:
  top_k: 8
  filter_out_of_stock: true
  dedupe_same_brand_variants: true
